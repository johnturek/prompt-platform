name: Deploy to Dokploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js

      - name: Commit build SHA into source
        run: |
          printf "module.exports = '%s';\n" "${{ github.sha }}" > src/views/_build-sha.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/views/_build-sha.js
          git diff --staged --quiet || (git commit -m "chore: embed build SHA [skip ci]" && git push)

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHEBUST=${{ github.sha }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dokploy deploy
        run: |
          curl -s -X POST "http://my.turek.in:3000/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${{ secrets.DOKPLOY_COMPOSE_ID }}\"}" \
            --fail --show-error

      - name: Wait for deploy to complete
        run: |
          for i in $(seq 1 24); do
            sleep 5
            STATUS=$(curl -s "http://my.turek.in:3000/api/compose.one?composeId=${{ secrets.DOKPLOY_COMPOSE_ID }}" \
              -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" | python3 -c "import json,sys; print(json.load(sys.stdin).get('composeStatus','unknown'))")
            echo "  Status: $STATUS"
            if [ "$STATUS" = "done" ]; then echo "âś… Deploy complete"; exit 0; fi
            if [ "$STATUS" = "error" ]; then echo "âťŚ Deploy failed"; exit 1; fi
          done
          echo "âš ď¸Ź Timed out waiting for deploy"
          exit 1

